<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(-45deg, #f3e7e9, #e3eeff, #f3e7e9, #e3eeff); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(30px) saturate(200%); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; }
        .form-control { border-radius: 12px; padding: 12px; background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); margin-bottom: 15px;}
        ul.errorlist { color: #FF3B30; list-style: none; padding: 0; text-align: left; font-size: 14px; margin-bottom: 15px;}
    </style>
</head>
<body>
    <div class="glass-card text-center">
        <h2 style="font-weight: 800; margin-bottom: 30px;">Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="text-start">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success w-100 py-3 mb-3" style="border-radius: 14px; font-weight: 700; background-color: #34C759; border: none;">Sign Up</button>
        </form>
        <p style="opacity: 0.7; margin: 0;">Already have an account? <a href="/accounts/login/" style="font-weight: 700; color: #007AFF; text-decoration: none;">Log in</a></p>
    </div>
</body>
</html>
