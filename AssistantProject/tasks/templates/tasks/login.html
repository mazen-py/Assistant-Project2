<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1c1c1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: white; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px) saturate(200%); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; }
        .form-control { border-radius: 12px; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; }
        .form-control:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); background: rgba(0,0,0,0.6); color: white; }
        .errorlist { color: #FF3B30; list-style: none; padding: 0; margin-bottom: 15px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="glass-card text-center">
        <h2 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 30px;">Welcome Back</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <p style="color: #FF3B30; font-weight: 600; font-size: 14px;">Invalid username or password.</p>
            {% endif %}

            <div class="text-start">
                <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="text-start">
                <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn w-100 py-3 mb-4 mt-2" style="border-radius: 14px; font-weight: 700; background-color: #007AFF; color: white; border: none; font-size: 16px;">Sign In</button>
        </form>
        
        <p style="opacity: 0.7; margin: 0; font-size: 15px;">Don't have an account? <a href="{% url 'register' %}" style="font-weight: 700; color: #007AFF; text-decoration: none;">Create one</a></p>
    </div>
</body>
</html>
