{% extends 'tasks/base.html' %}

{% block content %}
<div class="row mb-4 mt-2">
    <div class="col-12" style="padding-left: 20px;">
        <p style="opacity: 0.6; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;">{% now "l, F jS" %}</p>
        <h2 style="font-weight: 800; letter-spacing: -1.2px; font-size: 34px;">Hello, {{ user.username|title }}, here's your today's tasks</h2>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="apple-card p-4 mb-4">
            <h5 style="font-weight: 700; margin-bottom: 15px;">Active Tasks</h5>
            <ul class="list-group list-group-flush" style="background: transparent;">
                {% for task in today %}
                    <li class="list-group-item d-flex justify-content-between align-items-center" style="background: transparent; border-bottom: 1px solid rgba(128,128,128,0.2);">
                        <span style="font-weight: 600;">{{ task.title }}</span>
                    </li>
                {% empty %}
                    <li class="list-group-item text-muted" style="background: transparent; border: none;">No tasks for today. Time to relax!</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
