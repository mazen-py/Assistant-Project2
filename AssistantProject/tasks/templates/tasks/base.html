<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #f3e7e9, #e3eeff, #f3e7e9, #e3eeff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1c1c1e;
            transition: color 0.4s ease;
            min-height: 100vh;
            padding-bottom: 120px; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-dock-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .glass-dock {
            background: rgba(255, 255, 255, 0.3) !important;
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            gap: 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .dock-item {
            padding: 10px 18px;
            border-radius: 16px;
            color: #1c1c1e !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            border: none;
            background: none;
        }

        /* THE NUCLEAR FIX */
        .modal {
            z-index: 9999 !important;
        }
        .modal-backdrop {
            z-index: 9998 !important;
        }
        /* Ensures you can click through if things get weird */
        .modal-open {
            overflow: auto !important;
            padding-right: 0 !important;
        }

        .apple-card, .modal-content {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08) !important;
            border-radius: 24px;
        }

        body.dark-mode {
            background: linear-gradient(-45deg, #11091a, #0b1426, #0d1e20, #160a1a);
            background-size: 400% 400%;
        }
        body.dark-mode .glass-dock { background: rgba(0, 0, 0, 0.3) !important; border-color: rgba(255,255,255,0.1); }
        body.dark-mode .dock-item { color: #f5f5f7 !important; }
        body.dark-mode .apple-card, body.dark-mode .modal-content { background: rgba(30, 30, 35, 0.4) !important; }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4, body.dark-mode h5, body.dark-mode h6 { color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

    <div class="glass-dock-container">
        <div class="glass-dock">
            <a href="/" class="dock-item">Tasks</a>
            <a href="/finance/" class="dock-item">Wallet</a>
            <a href="/university/" class="dock-item">Uni</a>
           <a href="/automations/" class="dock-item">Auto</a>
<div style="width: 1px; background: rgba(128,128,128,0.2); margin: 8px 5px;"></div>
<a href="/settings/" class="dock-item" style="font-size: 16px;">⚙️</a>
<button id="darkModeToggle" class="dock-item">🌙</button>
        </div>
    </div>

    {% block modals %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark-mode'); darkModeToggle.innerHTML = '☀️'; }
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) { localStorage.setItem('theme', 'dark'); darkModeToggle.innerHTML = '☀️'; }
            else { localStorage.setItem('theme', 'light'); darkModeToggle.innerHTML = '🌙'; }
        });
    </script>
</body>
</html>
