<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1c1c1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: white; margin: 0; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px) saturate(200%); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); border-radius: 24px; padding: 40px; width: 100%; max-width: 450px; }
        .form-control { border-radius: 12px; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; }
        .form-control:focus { outline: none; border-color: #34C759; box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2); background: rgba(0,0,0,0.6); color: white; }
        .helptext { font-size: 12px; color: rgba(255,255,255,0.5); display: block; margin-top: -10px; margin-bottom: 15px; }
        ul.errorlist { color: #FF3B30; list-style: none; padding: 0; font-size: 13px; font-weight: 600; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="glass-card text-center">
        <h2 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 30px;">Create Account</h2>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            
            {% for field in form %}
                <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; color: rgba(255,255,255,0.8);">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <span class="helptext">{{ field.help_text }}</span>
                {% endif %}
                {% if field.errors %}
                    {{ field.errors }}
                {% endif %}
            {% endfor %}
            
            <button type="submit" class="btn w-100 py-3 mb-4 mt-3" style="border-radius: 14px; font-weight: 700; background-color: #34C759; color: white; border: none; font-size: 16px;">Sign Up</button>
        </form>
        
        <p style="opacity: 0.7; margin: 0; font-size: 15px; text-align: center;">Already have an account? <a href="{% url 'login' %}" style="font-weight: 700; color: #34C759; text-decoration: none;">Log in</a></p>
    </div>
</body>
</html>
